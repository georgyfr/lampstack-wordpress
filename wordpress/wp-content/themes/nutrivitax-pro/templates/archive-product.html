<!-- wp:template-part {"slug":"header","tagName":"header"} /-->

<main id="nvx-woo-content" class="nvx-main-content" role="main">

	<!-- wp:group {"align":"full","style":{"spacing":{"padding":{"top":"3rem","bottom":"4rem"}}},"layout":{"type":"constrained"}} -->
	<div class="wp-block-group alignfull nvx-shop-section" style="padding-top:3rem;padding-bottom:4rem;">
		<div style="max-width:1240px;margin:0 auto;padding:0 1.5rem;">

			<!-- Page Title -->
			<h1 style="font-size:2.5rem;font-weight:800;color:#12243A;margin-bottom:0.5rem;">Nos Produits</h1>
			<p style="font-size:1.05rem;color:#5a6a7a;margin-bottom:2rem;">Découvrez notre gamme de compléments alimentaires professionnels, formulés pour des résultats mesurables.</p>

			<!-- Shop Toolbar -->
			<div class="nvx-shop-toolbar" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;padding:1rem 1.25rem;background:#F0F9F4;border-radius:10px;">

				<!-- Result Count -->
				<span class="nvx-result-count" style="font-size:0.9rem;color:#5a6a7a;font-weight:500;">
					Affichage de <strong style="color:#12243A;">1–12</strong> sur <strong style="color:#12243A;">48</strong> résultats
				</span>

				<div style="display:flex;align-items:center;gap:1rem;">

					<!-- Sorting Dropdown -->
					<div class="nvx-sort" style="display:flex;align-items:center;gap:0.5rem;">
						<label for="nvx-sort-select" style="font-size:0.9rem;color:#5a6a7a;font-weight:500;white-space:nowrap;">Trier par :</label>
						<select id="nvx-sort-select" style="padding:0.5rem 2rem 0.5rem 0.75rem;border:1px solid #e2e8f0;border-radius:8px;font-size:0.9rem;color:#12243A;background:#fff;cursor:pointer;appearance:auto;">
							<option value="popularity">Popularité</option>
							<option value="rating">Note moyenne</option>
							<option value="newest">Derniers produits</option>
							<option value="price-asc">Prix croissant</option>
							<option value="price-desc">Prix décroissant</option>
						</select>
					</div>

					<!-- Grid/List Toggle -->
					<div class="nvx-view-toggle" style="display:flex;gap:0.25rem;">
						<button class="nvx-view-btn nvx-view-active" data-view="grid" style="width:38px;height:38px;border:1px solid #1A6B3A;background:#1A6B3A;color:#fff;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;" title="Grille">▦</button>
						<button class="nvx-view-btn" data-view="list" style="width:38px;height:38px;border:1px solid #e2e8f0;background:#fff;color:#5a6a7a;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;" title="Liste">☰</button>
					</div>

				</div>
			</div>

			<!-- Product Grid via Query -->
			<!-- wp:query {"queryId":1,"query":{"perPage":12,"pages":0,"offset":0,"postType":"product","order":"desc","orderBy":"popularity","author":"","search":"","exclude":[],"sticky":"","inherit":false},"displayLayout":{"type":"flex","columns":3},"layout":{"type":"constrained"}} -->
			<div class="wp-block-query">
				<div class="nvx-products-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:1.75rem;">

					<!-- wp:post-template -->
					<!-- wp:group {"className":"nvx-product-card","style":{"spacing":{"padding":{"top":"0","right":"0","bottom":"0","left":"0"}}}} -->
					<article class="wp-block-group nvx-product-card" style="background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;transition:transform 0.3s ease,box-shadow 0.3s ease;">

						<!-- Product Image -->
						<!-- wp:post-featured-image {"sizeSlug":"woocommerce_thumbnail","style":{"border":{"radius":"0"}},"linkTo":"product"} /-->

						<!-- Product Info -->
						<div style="padding:1.25rem;">
							<!-- wp:post-title {"isLink":true,"level":3,"style":{"typography":{"fontSize":"1.05rem","fontWeight":"700"},"spacing":{"margin":{"bottom":"0.5rem"}},"elements":{"link":{"color":{"text":"#12243A"},"hover":{"color":{"text":"#1A6B3A"}}}}}} /-->

							<!-- wp:paragraph {"className":"nvx-product-price","style":{"typography":{"fontSize":"1.15rem","fontWeight":"800"}}} -->
							<p class="nvx-product-price" style="font-size:1.15rem;font-weight:800;color:#1A6B3A;margin-bottom:0.75rem;">
								<!-- wp:post-terms {"term":"product_tag"} /-->
							</p>
							<!-- /wp:paragraph -->

							<!-- Add to Cart Button -->
							<a href="#" class="nvx-add-to-cart-link" style="display:block;text-align:center;padding:0.7rem;background:#1A6B3A;color:#fff;border-radius:8px;font-size:0.9rem;font-weight:700;text-decoration:none;transition:background 0.3s;">
								Ajouter au panier
							</a>
						</div>

					</article>
					<!-- /wp:group -->
					<!-- /wp:post-template -->

				</div>

				<!-- No Results -->
				<!-- wp:query-no-results -->
				<div style="text-align:center;padding:4rem 0;">
					<p style="font-size:1.1rem;color:#8a94a6;">Aucun produit trouvé.</p>
				</div>
				<!-- /wp:query-no-results -->

				<!-- Pagination -->
				<!-- wp:query-pagination {"paginationArrow":"arrow","layout":{"type":"flex","justifyContent":"center","spacing":{"margin":{"top":"2.5rem"}}}} -->
				<!-- wp:query-pagination-previous {"label":"← Précédent","style":{"elements":{"link":{"color":{"text":"#1A6B3A"}}}}} /-->
				<!-- wp:query-pagination-numbers {"style":{"elements":{"link":{"color":{"text":"#12243A"},"hover":{"color":{"text":"#1A6B3A"}}}}}} /-->
				<!-- wp:query-pagination-next {"label":"Suivant →","style":{"elements":{"link":{"color":{"text":"#1A6B3A"}}}}} /-->
				<!-- /wp:query-pagination -->

			</div>
			<!-- /wp:query -->

		</div>
	</div>
	<!-- /wp:group -->

</main>
