[PHP]
engine = On
short_open_tag = Off
precision = 14
output_buffering = 4096
zlib.output_compression = Off
implicit_flush = Off
serialize_precision = -1
disable_functions =
disable_classes =
zend.enable_gc = On
max_execution_time = 300
max_input_time = 300
memory_limit = 512M
post_max_size = 128M
upload_max_filesize = 128M
max_file_uploads = 50
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = __LAMPDIR__/var/log/php_error.log
date.timezone = Africa/Douala
session.save_handler = files
session.save_path = __LAMPDIR__/var/lib/php/sessions
session.use_strict_mode = 0
session.use_cookies = 1
session.use_only_cookies = 1
session.name = PHPSESSID
session.cookie_httponly = 1
session.gc_maxlifetime = 1440
file_uploads = On
extension_dir = __LAMPDIR__/usr/lib/php/20240924

; Load order: pdo first, then mysqlnd, then mysql extensions
extension=pdo
extension=mysqlnd
extension=mysqli
extension=pdo_mysql
extension=xml
extension=simplexml
extension=dom
extension=mbstring
extension=curl
extension=zip
extension=gd
extension=intl
extension=fileinfo
extension=exif
extension=readline
extension=tokenizer
extension=phar

; opcache is a Zend extension, load separately
zend_extension=__LAMPDIR__/usr/lib/php/20240924/opcache.so

; json and iconv are built-in since PHP 8.4

max_input_vars = 3000
allow_url_fopen = On
allow_url_include = Off

[CLI Server]
cli_server.color = On
